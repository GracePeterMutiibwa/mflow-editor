<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Moldo Flow Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: cream;
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 32px;
        text-align: center;
        user-select: none;
      }

      .logo {
        width: 80px;
        height: 80px;
        border-radius: 16px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
      }

      .version {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 20px;
      }

      .description {
        font-size: 14px;
        color: #94a3b8;
        line-height: 1.6;
        max-width: 300px;
        margin-bottom: 24px;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #1e293b;
        margin: 0 auto 20px;
      }

      .meta {
        font-size: 12px;
        color: #475569;
        line-height: 2;
      }

      .meta span {
        color: #64748b;
      }

      .footer {
        position: absolute;
        bottom: 20px;
        font-size: 11px;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="../build/icon.png" alt="Moldo icon" />
    <h1>Moldo Flow Editor</h1>
    <p class="version" id="version">v0.5.0</p>
    <p class="description">
      A visual flowchart-based programming environment that compiles to Python,
      designed for educational use.
    </p>
    <div class="divider"></div>
    <div class="meta">
      <div>Author &nbsp;<span>Grace Peter Mutiibwa</span></div>

      <div>License &nbsp;<span>MIT</span></div>
    </div>
    <div class="footer">© 2025 Grace Peter Mutiibwa</div>

    <script src="about.js"></script>
  </body>
</html>
