<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MoldoCanvas — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin:0; height:100%; display:flex; flex-direction:column; background:#fafaf9; }
  @keyframes moldoPulse {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.18); }
  }
  #toolbar {
    height:42px; flex-shrink:0;
    display:flex; align-items:center; gap:8px; padding:0 14px;
    background:#fff; border-bottom:1px solid #e6e6e6;
    font-family:"IBM Plex Sans",system-ui,sans-serif; font-size:12px;
  }
  #toolbar button { padding:5px 10px; border:1px solid #e6e6e6; border-radius:4px; background:#fafaf9; cursor:pointer; font-family:inherit; font-size:11px; }
  #toolbar button:hover { background:#eff4ff; border-color:#2563eb; color:#2563eb; }
  #canvas-wrap { flex:1; overflow:hidden; }
  #log { height:32px; flex-shrink:0; display:flex; align-items:center; padding:0 14px;
    background:#1a1a1a; color:#a3e635; font-family:"JetBrains Mono",monospace; font-size:11px; }
</style>
</head>
<body>

<div id="toolbar">
  <strong style="margin-right:8px; font-size:12px; color:#6b6b6b;">MoldoCanvas demo</strong>
  <button onclick="addRect()">Add process node</button>
  <button onclick="addDiamond()">Add if/else node</button>
  <button onclick="serialize()">Serialize</button>
  <button onclick="clearCanvas()">Clear</button>
  <span style="margin-left:auto; color:#9a9a9a; font-family:'JetBrains Mono',monospace; font-size:10px;">
    drag nodes · drag connect handle → to wire · double-click to inspect · Delete key to remove
  </span>
</div>

<div id="canvas-wrap"></div>
<div id="log">Ready.</div>

<script src="../../engine/MoldoRegistry.js"></script>
<script src="../nodes/MoldoNode.js"></script>
<script src="./MoldoCanvas.js"></script>
<script>
  const log = document.getElementById('log');

  const registry = new MoldoRegistry();
  let canvas;

  registry.loadAll([
    '../../molds/variables.mold.json',
    '../../molds/io.mold.json',
    '../../molds/control.mold.json',
    '../../molds/math.mold.json',
  ]).then(() => {
    canvas = new MoldoCanvas({
      container: document.getElementById('canvas-wrap'),
      registry,
      onNodeDblClick: ({ node }) => {
        log.textContent = `dblclick → ${node.id} (${node.block.name}) — would open MoldoPanel`;
      },
    });
    document.getElementById('canvas-wrap').appendChild(canvas.el);
    Object.assign(canvas.el.style, { width:'100%', height:'100%' });

    canvas.el.addEventListener('moldo:canvas:select', e => {
      const n = e.detail.node;
      log.textContent = n ? `Selected: ${n.id} (${n.block.name})` : 'Deselected';
    });
    canvas.el.addEventListener('moldo:canvas:change', () => {
      /* silent — would update toolbar state in full app */
    });

    /* seed with two nodes */
    addRect();
    addDiamond();
  });

  let counter = 0;
  function addRect() {
    if (!canvas) return;
    const block = registry.getBlock('variables', 'declare');
    canvas.addNode({ moldName:'variables', blockId:'declare', block, x: 80 + counter*60, y: 120 });
    counter++;
  }
  function addDiamond() {
    if (!canvas) return;
    const block = registry.getBlock('control', 'branch');
    canvas.addNode({ moldName:'control', blockId:'branch', block, x: 380 + counter*20, y: 130 });
    counter++;
  }
  function serialize() {
    if (!canvas) return;
    const data = canvas.serialize();
    log.textContent = JSON.stringify(data).slice(0, 200) + '…';
  }
  function clearCanvas() {
    if (!canvas) return;
    canvas.clear();
    log.textContent = 'Canvas cleared.';
  }
</script>
</body>
</html>
